{% extends "base.html" %}
{% block title %}Rezept Ansicht{% endblock %}
{% block content %}
<div class="card shadow-sm p-4">
  <h2>{{ recipe.title }}</h2>
  <h6 class="text-muted">von {{ recipe.user.username }}</h6>
  <hr>
  <p><strong>Beschreibung:</strong><br>{{ recipe.description }}</p>
  <p><strong>Zutaten:</strong><br>{{ recipe.ingredients }}</p>
  <p><strong>Anleitung:</strong><br>{{ recipe.instructions }}</p>
  <a href="{{ url_for('recipes.index') }}" class="btn btn-secondary">Zurück</a>
</div>
{% endblock %}
